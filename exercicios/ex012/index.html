<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu própio servidor</p>
    <video controls width="500" poster="imagens/capavideo.jpg" loop>
        <source src="midia/Meu-Video.webM.webm" type="video/webM">
        <source src="midia/meu-video.MKV(1).mkv" type="video/MKV">
        <source src="midia/meu-video.mp4.mp4" type="video/mp4">
        <source src="midia/meu-video.mp4.ogv" type="video/ogv">
    </video>
    <p>Seu navegador não tem compatibilidade com reprodução de vídeos.</p>
    <h1>Inserindo vídeos do youtobe</h1>
    <h1>Inserindo vídeos do YouTube</h1>
     <iframe width="560" height="315"
    src="https://www.youtube.com/embed/OzUnqQk4eOg"
    allowfullscreen>
    </iframe>
    <h1>Inserindo vídeos com <mark style="background-color: chartreuse;">Vimeo</mark></h1>
</body>
</html>
