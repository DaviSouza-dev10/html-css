<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family:'chique';
            src: url(fonts/Sparkling\ Valentine.ttf) format(truetype);
            font-weight: normal;
            font-style: italic;
            /*
            Tipos de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            truetype-aat (Apple advanced Typograph)
            - svg
            */
        }
        body{
        font-family: Arial, Helvetica, sans-serif;
        }
        h1{
            font-family:arial;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Similique iusto, excepturi possimus deserunt fuga hic debitis repellendus adipisci dolores sequi quisquam perspiciatis odio assumenda aut doloremque facere sunt quam consectetur?</p>
</body>
</html>
