<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midías em HTML5</title>
</head>
<body>
    <h1>Imagens Dinamicas</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador.</p>
    <picture>
        <source media="(max-width: 700px)" srcset="iMAGENS/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="iMAGENS/foto-m.png" type="image/png">
        <img src="iMAGENS/foto-g.png" alt="Imagem Flexível">
    </picture>
    <h1>Reproduzindo Áudio</h1>
    <p>Vamos aprender a reproduzir aúdios em HTML5.</p>
    <audio src="midia/she-america.mp3.mp3" controls></audio>
    <audio preload="auto" autoplay contro/ls loop>
        <source src="midia/guanacast-33.mp3" type="audio/mpeg">
        <source src="midia/guanacast-33.ogg" type="audio/ogg">
        <source src="midia/guanacast-33.wav" type="audio/wav">

        <p>Infelizmente seu navegador nao consegue reproduzir seu audio, <a href="midia/guanacast-33.mp3">Clique aqui</a> para baixar o arquivo</p>
    </audio>
</body>
</html>
